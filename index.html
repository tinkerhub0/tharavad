<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tharavad.xyz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --border: rgba(255,255,255,0.08);
    --text: #e8e8e8;
    --muted: #666;
    --green: #3fb950;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .wordmark {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--text);
    text-decoration: none;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 80px 40px;
    max-width: 680px;
  }

  .label {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: clamp(36px, 6vw, 68px);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 28px;
  }

  h1 .dim { color: var(--muted); }

  .description {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 16px;
    font-weight: 300;
    line-height: 1.75;
    color: #999;
    max-width: 440px;
    margin-bottom: 52px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 13px 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-decoration: none;
    color: #0e0e0e;
    background: #e8e8e8;
    border-radius: 2px;
    transition: background 0.15s, transform 0.1s;
  }

  .btn:hover { background: #fff; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn svg {
    width: 14px; height: 14px;
    stroke: #0e0e0e; fill: none;
    stroke-width: 1.5;
    stroke-linecap: round; stroke-linejoin: round;
    transition: transform 0.15s;
  }

  .btn:hover svg { transform: translateX(2px); }

  footer {
    padding: 24px 40px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--text); }

  @media (max-width: 600px) {
    header, main, footer { padding-left: 24px; padding-right: 24px; }
    main { padding-top: 60px; }
  }
</style>
</head>
<body>

<header>
  <span class="wordmark">tharavad.xyz</span>
  <div class="status">
    <div class="dot"></div>
    online
  </div>
</header>

<main>
  <p class="label">TinkerHub Kerala &mdash; Community Server</p>
  <h1>A Linux server<br>for builders<span class="dim">.</span></h1>
  <p class="description">
    Shared infrastructure for TinkerHub Kerala members.
    SSH in, run servers, host projects, learn in public.
  </p>
  <a class="btn" href="#">
    Read the wiki
    <svg viewBox="0 0 16 16"><line x1="3" y1="8" x2="13" y2="8"/><polyline points="9 4 13 8 9 12"/></svg>
  </a>
</main>

<footer>
  <span>ssh -p 2222 username@tharavad.xyz</span>
  <h4>backed by Tinkerhub</h4>
  <a href="https://github.com/tinkerhub0/tharavad">github</a>
</footer>

</body>
</html>
