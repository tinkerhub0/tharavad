name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - www/**
      - index.html

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy www/ to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 187.127.143.52
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "index.html,www/"
          target: /var/www/tharavad/
          strip_components: 0
